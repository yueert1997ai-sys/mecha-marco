<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#071226">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="天穹断刃">
  <title>天穹断刃 4.3 · Mecha Marco</title>
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./mech3d41.css">
  <link rel="stylesheet" href="./visual415.css">
  <link rel="stylesheet" href="./visual415-refine.css">
  <link rel="stylesheet" href="./depth416.css">
  <link rel="stylesheet" href="./campaign42.css">
  <link rel="stylesheet" href="./iphone17.css">
  <link rel="stylesheet" href="./frontline-depth43.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <main id="app">
    <canvas id="game-canvas" aria-label="天穹断刃战斗画面"></canvas>
    <canvas id="mech-3d-canvas" aria-label="4.2 WebGL 机体显示层"></canvas>
    <section id="hud" class="hud hidden" aria-live="polite">
      <div class="hud-top-left">
        <div class="meter hp-meter"><div id="hp-fill"></div><span id="hp-text">120 / 120</span></div>
        <div class="meter overdrive-meter"><div id="overdrive-fill"></div><span>OVERDRIVE</span></div>
      </div>
      <div class="hud-top-center"><strong id="room-label">OG-01</strong><div id="module-strip" class="module-strip"></div></div>
      <div class="hud-top-right" id="credits-label">● 0　◆ 0</div>
      <div id="boss-bar" class="boss-bar hidden"><span id="boss-name">守墓者·阿尔法</span><div><i id="boss-fill"></i></div></div>
    </section>
    <div id="toast" class="toast"></div>
    <section id="overlay" class="overlay show"><div id="panel" class="panel"></div></section>
    <section id="touch-controls" class="touch-controls hidden" aria-label="触控操作">
      <div class="stick move-stick" data-stick="move"><div class="stick-ring"></div><div class="stick-knob"></div><span>移动</span></div>
      <div class="stick aim-stick" data-stick="aim"><div class="stick-ring"></div><div class="stick-knob"><strong>射</strong><small>主炮</small></div><span>拖曳瞄准</span></div>
      <button class="action-btn saber-btn" data-action="secondary" aria-label="军刀"><i></i><b></b><strong>斩</strong><span>军刀</span></button>
      <button class="action-btn dash-btn" data-action="dash" aria-label="推进"><i></i><b></b><strong>突</strong><span>推进</span></button>
      <button class="action-btn missile-btn" data-action="ordnance" aria-label="导弹"><i></i><b></b><strong>弹</strong><span>挂载</span></button>
      <button class="action-btn overdrive-btn" data-action="overdrive" aria-label="超限"><i></i><b></b><strong>超</strong><span>超限</span></button>
      <button class="pause-btn" data-action="pause">Ⅱ</button>
    </section>
    <section class="rotate-warning"><div><strong>请将 iPhone 横屏</strong><p>4.2 连续战线按横屏战斗设计</p></div></section>
  </main>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
