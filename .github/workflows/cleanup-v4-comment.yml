name: Finalize Mecha 4.0 Development Branch

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  finalize:
    if: github.event.issue.pull_request && github.event.issue.number == 4 && contains(github.event.comment.body, '/finalize-v4')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout development branch
        uses: actions/checkout@v4
        with:
          ref: develop/4.0-core-slice
          fetch-depth: 0

      - name: Re-run 4.0 verification
        shell: bash
        run: |
          set -euo pipefail
          cd v4
          npm test
          find src tests scripts -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | xargs -0 -n1 node --check

      - name: Remove transfer scaffolding and add permanent CI
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap/v4
          rm -f .github/workflows/bootstrap-v4.yml
          rm -f v4/README_UPLOAD_PENDING.md
          cat > .github/workflows/verify-v4.yml <<'YAML'
          name: Verify Mecha 4.0

          on:
            pull_request:
              paths:
                - "v4/**"
                - ".github/workflows/verify-v4.yml"
            push:
              branches:
                - main
                - develop/4.0-core-slice
              paths:
                - "v4/**"
                - ".github/workflows/verify-v4.yml"

          permissions:
            contents: read

          jobs:
            test:
              runs-on: ubuntu-latest
              timeout-minutes: 10
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22
                - name: Run system tests
                  working-directory: v4
                  run: npm test
                - name: Validate JavaScript modules
                  shell: bash
                  run: find v4/src v4/tests v4/scripts -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | xargs -0 -n1 node --check
          YAML

      - name: Commit finalized branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Branch already finalized."
            exit 0
          fi
          git commit -m "chore(v4): finalize verified source and permanent CI"
          git push origin HEAD:develop/4.0-core-slice
