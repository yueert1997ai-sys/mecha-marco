name: Bootstrap Mecha 4.0 by Review Command

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  reconstruct-and-verify:
    if: github.event.issue.pull_request && github.event.issue.number == 4 && contains(github.event.comment.body, '/bootstrap-v4')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout development branch
        uses: actions/checkout@v4
        with:
          ref: develop/4.0-core-slice
          fetch-depth: 0

      - name: Reconstruct and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/v4/part-*.b64 | base64 --decode > /tmp/mecha-marco-v4-source.tar.gz
          echo "4d33cc69497d9359844444c28df52844a3f660f66fa5cebe8f0e022615a5c0f0  /tmp/mecha-marco-v4-source.tar.gz" | sha256sum --check --strict
          rm -rf v4
          mkdir -p v4
          tar -xzf /tmp/mecha-marco-v4-source.tar.gz -C v4
          test -f v4/index.html
          test -f v4/src/main.js
          test -f v4/src/game.js
          test -f v4/docs/HADES_ARCHITECTURE_4.0.md
          test -f v4/package.json
          cd v4
          npm test
          find src tests scripts -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | xargs -0 -n1 node --check

      - name: Commit verified source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A v4
          if git diff --cached --quiet; then
            echo "Verified source already committed."
            exit 0
          fi
          git commit -m "feat(v4): add verified Hades-inspired vertical slice"
          git push origin HEAD:develop/4.0-core-slice
