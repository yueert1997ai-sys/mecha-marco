name: QA V4.2 Continuous Campaign

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  mobile-campaign-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify source and unit tests
        working-directory: v4
        run: |
          npm run syntax
          npm test

      - name: Install Playwright Python
        run: python3 -m pip install --user playwright

      - name: Locate Chrome
        shell: bash
        run: |
          chrome="$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          test -n "$chrome"
          echo "CHROME_PATH=$chrome" >> "$GITHUB_ENV"

      - name: Start local server
        shell: bash
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 >/tmp/mecha-v42-server.log 2>&1 &
          echo $! > /tmp/mecha-v42-server.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4173/v4/ >/dev/null && exit 0
            sleep .5
          done
          cat /tmp/mecha-v42-server.log
          exit 1

      - name: Run twelve-stage mobile campaign QA
        env:
          QA_URL: http://127.0.0.1:4173/v4/?qa=v42
          QA_OUT: /tmp/v42qa
        run: python3 v4/scripts/qa-v42-continuous.py

      - name: Upload campaign screenshots and metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mecha-marco-v42-continuous-campaign
          path: /tmp/v42qa
          if-no-files-found: warn
          retention-days: 1

      - name: Show server log on failure
        if: failure()
        run: cat /tmp/mecha-v42-server.log || true
