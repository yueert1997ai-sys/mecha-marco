name: Export V4.1 Runtime

on:
  push:
    branches: [qa/v41-runtime-export]
  pull_request:
    branches: [feat/v4-1-full-mech-redesign]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify redesigned runtime
        run: |
          cd v4
          npm run syntax
          npm test
      - name: Install browser QA dependency
        run: python3 -m pip install --user playwright
      - name: Locate Chrome
        run: |
          chrome="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          echo "CHROME_BIN=$chrome" >> "$GITHUB_ENV"
      - name: Run real browser interaction and screenshots
        id: visualqa
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p v4/qa-artifacts
          set -o pipefail
          python3 v4/scripts/visual-qa.py 2>&1 | tee v4/qa-artifacts/run.log
      - name: Upload runtime
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mecha-marco-v41-runtime
          path: v4
          if-no-files-found: error
          retention-days: 1
      - name: Upload visual QA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mecha-marco-v41-visual-qa
          path: v4/qa-artifacts
          if-no-files-found: error
          retention-days: 1
      - name: Fail when visual QA failed
        if: steps.visualqa.outcome != 'success'
        run: exit 1
