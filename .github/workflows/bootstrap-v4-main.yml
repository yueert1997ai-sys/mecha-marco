name: Bootstrap Mecha 4.0 Development Branch

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/bootstrap-v4-main.yml"

permissions:
  contents: write

jobs:
  reconstruct-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout 4.0 development branch
        uses: actions/checkout@v4
        with:
          ref: develop/4.0-core-slice
          fetch-depth: 0

      - name: Reconstruct source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/v4/part-*.b64 | base64 --decode > /tmp/mecha-marco-v4-source.tar.gz
          echo "4d33cc69497d9359844444c28df52844a3f660f66fa5cebe8f0e022615a5c0f0  /tmp/mecha-marco-v4-source.tar.gz" | sha256sum --check --strict
          rm -rf v4
          mkdir -p v4
          tar -xzf /tmp/mecha-marco-v4-source.tar.gz -C v4
          test -f v4/index.html
          test -f v4/src/main.js
          test -f v4/src/game.js
          test -f v4/docs/HADES_ARCHITECTURE_4.0.md
          test -f v4/package.json

      - name: Run full automated test suite
        working-directory: v4
        run: npm test

      - name: Validate every JavaScript module
        shell: bash
        run: |
          set -euo pipefail
          find v4/src v4/tests v4/scripts -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | xargs -0 -n1 node --check

      - name: Commit verified source to development branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A v4
          if git diff --cached --quiet; then
            echo "Verified source already committed."
            exit 0
          fi
          git commit -m "feat(v4): add verified Hades-inspired vertical slice"
          git push origin HEAD:develop/4.0-core-slice
